<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1 到 50 - 手速挑战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow: hidden;
        }

        /* 开始界面 */
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 100;
        }

        #start-screen h1 {
            font-size: 3em;
            color: white;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        #start-screen p {
            color: rgba(255,255,255,0.9);
            font-size: 1.2em;
            margin-bottom: 40px;
            text-align: center;
            padding: 0 20px;
        }

        #start-btn {
            padding: 20px 60px;
            font-size: 1.5em;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.2s;
            font-weight: bold;
        }

        #start-btn:active {
            transform: scale(0.95);
        }

        /* 游戏界面 */
        #game-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        /* 顶部信息栏 */
        #top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            z-index: 50;
        }

        .stat {
            color: white;
            font-size: 1.3em;
            font-weight: bold;
        }

        .stat-label {
            opacity: 0.8;
            font-size: 0.8em;
            margin-right: 5px;
        }

        #timer {
            color: #ffd700;
        }

        /* 数字网格 - 小数字在上层 */
        #number-grid {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            padding: 20px;
            max-width: 500px;
            width: 95%;
        }

        .number-btn {
            aspect-ratio: 1;
            background: white;
            border: none;
            border-radius: 15px;
            font-size: 1.8em;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.1s, background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .number-btn:active {
            transform: scale(0.9);
        }

        /* 小数字在上层（z-index 更高） */
        .number-btn[data-num^="1"],
        .number-btn[data-num^="2"],
        .number-btn[data-num^="3"] {
            z-index: 40;
        }

        .number-btn[data-num^="4"],
        .number-btn[data-num^="5"] {
            z-index: 30;
        }

        .number-btn[data-num^="6"],
        .number-btn[data-num^="7"] {
            z-index: 20;
        }

        .number-btn[data-num^="8"],
        .number-btn[data-num^="9"],
        .number-btn[data-num="10"],
        .number-btn[data-num="50"] {
            z-index: 10;
        }

        .number-btn.correct {
            background: #4CAF50;
            color: white;
            animation: correctPulse 0.3s;
        }

        .number-btn.wrong {
            background: #f44336;
            color: white;
            animation: wrongShake 0.3s;
        }

        .number-btn.disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* 结束界面 */
        #end-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 200;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #end-screen h2 {
            color: white;
            font-size: 2.5em;
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255,255,255,0.1);
            padding: 20px 30px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-card .value {
            color: #ffd700;
            font-size: 2em;
            font-weight: bold;
        }

        .stat-card .label {
            color: rgba(255,255,255,0.7);
            font-size: 0.9em;
            margin-top: 5px;
        }

        #restart-btn {
            padding: 15px 40px;
            font-size: 1.2em;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }

        /* 响应式 */
        @media (max-width: 400px) {
            #number-grid {
                gap: 8px;
                padding: 15px;
            }
            .number-btn {
                font-size: 1.5em;
                border-radius: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- 开始界面 -->
    <div id="start-screen">
        <h1>🎯 1 到 50</h1>
        <p>按顺序点击数字 1→50<br>比拼你的手速！</p>
        <button id="start-btn">开始游戏</button>
    </div>

    <!-- 游戏界面 -->
    <div id="game-screen">
        <div id="top-bar">
            <div class="stat">
                <span class="stat-label">目标:</span>
                <span id="target-num">1</span>
            </div>
            <div class="stat">
                <span class="stat-label">时间:</span>
                <span id="timer">60</span>
            </div>
            <div class="stat">
                <span class="stat-label">正确:</span>
                <span id="correct-count">0</span>
            </div>
        </div>
        <div id="number-grid"></div>
    </div>

    <!-- 结束界面 -->
    <div id="end-screen">
        <h2>⏰ 时间到!</h2>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="value" id="final-score">0</div>
                <div class="label">正确数</div>
            </div>
            <div class="stat-card">
                <div class="value" id="final-accuracy">0%</div>
                <div class="label">准确率</div>
            </div>
            <div class="stat-card">
                <div class="value" id="final-apm">0</div>
                <div class="label">APM</div>
            </div>
            <div class="stat-card">
                <div class="value" id="final-time">0s</div>
                <div class="label">平均反应</div>
            </div>
        </div>
        <button id="restart-btn">再来一局</button>
    </div>

    <script>
        // 游戏状态
        let gameState = {
            target: 1,
            correct: 0,
            wrong: 0,
            timeLeft: 60,
            startTime: null,
            clickTimes: [],
            timerInterval: null
        };

        // DOM 元素
        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const endScreen = document.getElementById('end-screen');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const numberGrid = document.getElementById('number-grid');
        const targetNumEl = document.getElementById('target-num');
        const timerEl = document.getElementById('timer');
        const correctCountEl = document.getElementById('correct-count');

        // 初始化游戏
        function initGame() {
            numberGrid.innerHTML = '';
            
            // 创建 50 个数字按钮（乱序排列）
            const numbers = Array.from({length: 50}, (_, i) => i + 1);
            shuffleArray(numbers);
            
            numbers.forEach(num => {
                const btn = document.createElement('button');
                btn.className = 'number-btn';
                btn.textContent = num;
                btn.dataset.num = num;
                btn.onclick = () => handleClick(num, btn);
                numberGrid.appendChild(btn);
            });
        }

        // 开始游戏
        function startGame() {
            gameState = {
                target: 1,
                correct: 0,
                wrong: 0,
                timeLeft: 60,
                startTime: Date.now(),
                clickTimes: [],
                timerInterval: null
            };

            startScreen.style.display = 'none';
            gameScreen.style.display = 'block';
            endScreen.style.display = 'none';

            initGame();
            updateUI();

            // 启动计时器
            gameState.timerInterval = setInterval(() => {
                gameState.timeLeft--;
                timerEl.textContent = gameState.timeLeft;
                
                if (gameState.timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        // 处理点击
        function handleClick(num, btn) {
            const now = Date.now();
            gameState.clickTimes.push(now);

            if (num === gameState.target) {
                // 正确
                gameState.correct++;
                btn.classList.add('correct');
                setTimeout(() => btn.classList.remove('correct'), 300);
                
                gameState.target++;
                if (gameState.target > 50) {
                    endGame(true);
                    return;
                }
            } else {
                // 错误
                gameState.wrong++;
                btn.classList.add('wrong');
                setTimeout(() => btn.classList.remove('wrong'), 300);
            }

            updateUI();
        }

        // 更新 UI
        function updateUI() {
            targetNumEl.textContent = gameState.target;
            timerEl.textContent = gameState.timeLeft;
            correctCountEl.textContent = gameState.correct;
        }

        // 结束游戏
        function endGame(complete = false) {
            clearInterval(gameState.timerInterval);
            
            gameScreen.style.display = 'none';
            endScreen.style.display = 'flex';

            // 计算统计
            const totalTime = 60 - gameState.timeLeft;
            const accuracy = gameState.correct / (gameState.correct + gameState.wrong) * 100;
            const apm = gameState.correct / (totalTime / 60);
            const avgReaction = totalTime / gameState.correct * 1000;

            document.getElementById('final-score').textContent = gameState.correct;
            document.getElementById('final-accuracy').textContent = accuracy.toFixed(1) + '%';
            document.getElementById('final-apm').textContent = apm.toFixed(1);
            document.getElementById('final-time').textContent = (avgReaction / 1000).toFixed(2) + 's';

            if (complete) {
                document.querySelector('#end-screen h2').textContent = '🎉 恭喜完成!';
            }
        }

        // 洗牌算法
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // 事件绑定
        startBtn.onclick = startGame;
        restartBtn.onclick = startGame;
    </script>
</body>
</html>
